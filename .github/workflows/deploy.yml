name: Deploy Marketing to Hetzner

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: nexgittrev/peoplecore-marketing
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Hetzner
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key:      ${{ secrets.HETZNER_SSH_KEY }}
          script: |
            set -e
            cd /opt/peoplecore
            echo "Pulling marketing image..."
            docker compose -f docker-compose.cloud.yml pull marketing
            echo "Restarting marketing site..."
            docker compose -f docker-compose.cloud.yml up -d --no-deps marketing
            docker image prune -f
            echo "Marketing deploy complete!"
